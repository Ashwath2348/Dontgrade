<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History - dontgrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="history">
    <div class="page">
        <header class="hero">
            <h1><span>dontgrade</span> - Analysis History</h1>
        </header>

        <section class="app-shell single-column">
            <div class="workspace">
                <div class="workspace-header">
                    <div class="page-tabs">
                        <a class="tab-link" href="/">Analyze</a>
                        <a class="tab-link active" href="/history-page">History</a>
                    </div>
                    <div class="user-actions">
                        <span id="currentUserEmail">user@example.com</span>
                        <button id="logoutBtn" class="link-btn">Logout</button>
                    </div>
                </div>

                <div class="card history-card">
                    <div class="history-headline">
                        <h3>Your History</h3>
                        <button id="refreshHistoryBtn" class="secondary">Refresh</button>
                    </div>
                    <div id="historyList"></div>
                </div>
            </div>
        </section>

        <div class="toast" id="toast"></div>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
